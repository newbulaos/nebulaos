apiVersion: apps/v1
kind: Deployment
metadata:
  name: nebulaos-backend
  namespace: nebulaos
  labels:
    app: nebulaos-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nebulaos-backend
  template:
    metadata:
      labels:
        app: nebulaos-backend
    spec:
      serviceAccountName: nebulaos
      containers:
        - name: backend
          image: ghcr.io/nebulaos/nebulaos:latest
          ports:
            - containerPort: 8080
          env:
            - name: ENV
              value: production
            - name: DB_DRIVER
              value: sqlite
            - name: DB_PATH
              value: /data/nebulaos.db
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: nebulaos-secrets
                  key: jwt-secret
          volumeMounts:
            - name: data
              mountPath: /data
            - name: docker-sock
              mountPath: /var/run/docker.sock
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: nebulaos-data
        - name: docker-sock
          hostPath:
            path: /var/run/docker.sock
            type: Socket
---
apiVersion: v1
kind: Service
metadata:
  name: nebulaos-backend
  namespace: nebulaos
spec:
  selector:
    app: nebulaos-backend
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nebulaos-data
  namespace: nebulaos
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi
